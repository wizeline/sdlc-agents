name: Version AI Cores
on:
  push:
    branches: [ main ]
    paths:
      - 'aicores/**' # Only triggers if something inside 'aicores' changes

jobs:
  tag-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to see previous tags

      - name: Identify Changed AI Core
        id: var
        run: |
          # Finds the first folder under 'aicores' that changed in this push
          # Filters out hidden files (e.g. .DS_Store) to avoid invalid tag names
          CORE=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} \
            | grep '^aicores/' \
            | cut -d/ -f2 \
            | grep -v '^\.' \
            | sort -u \
            | head -n1)
          echo "core_name=$CORE" >> $GITHUB_OUTPUT

      - name: Create and Push Tag
        if: steps.var.outputs.core_name != ''
        run: |
          CORE=${{ steps.var.outputs.core_name }}

          # Find the latest semantic version tag for this AI Core
          LATEST=$(git tag --list "aicores/$CORE/v*" \
            | sed "s|aicores/$CORE/v||" \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -n1)

          if [ -z "$LATEST" ]; then
            VERSION="v1.0.0"
          else
            # Increment the patch version
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          TAG_NAME="aicores/$CORE/$VERSION"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
